name: release

on:
  workflow_dispatch: 
  push:
    tags:
      - "v*"

permissions:
  contents: write
jobs:
  linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make build-linux-amd64 && make build-cli-all

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: bin/

  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make build-linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: bin/*linux-arm64*

  release:
    needs: [linux-amd64, linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show Artifacts
        run: find artifacts -type f

      - name: Package
        run: |
          mkdir release

          find artifacts -type f | while read file; do
            name=$(basename "$file")

            if [[ "$name" == *.exe ]]; then
              base="${name%.exe}"
              zip -j "release/${base}.zip" "$file"
            else
              tar -czf "release/${name}.tar.gz" \
                -C "$(dirname "$file")" \
                "$name"
            fi
          done
      - name: Show Release Files
        run: ls -lh release
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*